<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중1 과학: 분자 운동과 열 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas {
            touch-action: none; 
            background-color: #0f172a;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-md border-b border-blue-200 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-blue-800 flex items-center gap-2">
                <span class="text-yellow-500">⚛️</span> 눈에 보이지 않는 분자의 운동
            </h1>
            <div class="text-sm font-medium text-slate-500 hidden sm:block bg-blue-100 px-3 py-1 rounded-full">
                중학교 1학년 과학: 열과 우리 삶
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-6 flex flex-col lg:flex-row gap-6">
        
        <!-- 왼쪽: 시뮬레이션 화면 -->
        <div class="flex-grow flex flex-col bg-white p-4 rounded-3xl shadow-lg border-4 border-blue-200">
            <div class="mb-2 flex justify-between items-end">
                <p class="text-sm font-bold text-blue-600 italic">"분자는 뜨거울수록 더 빨리 움직여요!"</p>
                <div id="statusInfo" class="text-xs font-mono bg-slate-100 px-2 py-1 rounded tracking-tighter">입자 수: <span id="currentCount">150</span>개</div>
            </div>
            <div class="relative w-full aspect-[3/2] bg-slate-900 rounded-2xl overflow-hidden shadow-inner border-2 border-slate-700">
                <canvas id="simCanvas" class="absolute top-0 left-0 w-full h-full cursor-pointer"></canvas>
            </div>
            
            <!-- 온도 인디케이터 -->
            <div class="mt-6 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <div class="flex items-center justify-between text-sm font-bold mb-2">
                    <span class="text-blue-500">❄️ 차가움 (느린 운동)</span>
                    <span class="text-rose-500">🔥 뜨거움 (빠른 운동)</span>
                </div>
                <div class="w-full h-4 rounded-full shadow-inner border border-slate-300" style="background: linear-gradient(to right, #3b82f6, #06b6d4, #22c55e, #eab308, #ef4444);"></div>
            </div>
        </div>

        <!-- 오른쪽: 조작 도구 -->
        <aside class="w-full lg:w-80 flex-shrink-0 flex flex-col gap-4">
            <div class="bg-white p-5 rounded-3xl shadow-md border-2 border-slate-100">
                <button id="btnPlayPause" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg transition-all shadow-lg flex justify-center items-center gap-2">
                    <span>▶ 실험 시작</span>
                </button>
                <div class="grid grid-cols-2 gap-2 mt-3">
                    <button id="btnResetParticles" class="py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors text-xs">
                        입자 다시 놓기
                    </button>
                    <button id="btnClearWalls" class="py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors text-xs">
                        벽 모두 지우기
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-md border-2 border-slate-100">
                <h2 class="text-sm font-black text-blue-500 uppercase tracking-tighter mb-4">설정 및 도구</h2>
                <div class="grid grid-cols-2 gap-2 mb-4" id="toolSelector">
                    <button data-tool="heat" class="tool-btn active-tool py-3 bg-rose-50 border-2 border-rose-400 text-rose-700 rounded-2xl font-bold text-sm flex flex-col items-center gap-1">
                        <span class="text-xl">🔥</span> 가열하기
                    </button>
                    <button data-tool="cold" class="tool-btn py-3 bg-slate-50 border-2 border-transparent text-slate-600 rounded-2xl font-bold text-sm flex flex-col items-center gap-1 hover:bg-blue-50 hover:text-blue-700 hover:border-blue-200">
                        <span class="text-xl">❄️</span> 식히기
                    </button>
                    <button data-tool="wall" class="tool-btn py-3 bg-slate-50 border-2 border-transparent text-slate-600 rounded-2xl font-bold text-sm flex flex-col items-center gap-1 hover:bg-slate-200">
                        <span class="text-xl">🧱</span> 벽 세우기
                    </button>
                    <button data-tool="eraser" class="tool-btn py-3 bg-slate-50 border-2 border-transparent text-slate-600 rounded-2xl font-bold text-sm flex flex-col items-center gap-1 hover:bg-slate-200">
                        <span class="text-xl">🧽</span> 지우개
                    </button>
                </div>

                <div class="p-3 bg-slate-50 rounded-2xl border border-slate-200 mb-3">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-slate-600">브러시 크기</span>
                        <span id="brushSizeVal" class="text-xs font-mono text-blue-600">40</span>
                    </div>
                    <input type="range" id="brushSlider" min="10" max="100" value="40" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div class="p-3 bg-blue-50 rounded-2xl border border-blue-100">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-blue-800">입자 개수</span>
                        <span id="particleCountVal" class="text-xs font-mono text-blue-600">150</span>
                    </div>
                    <input type="range" id="particleSlider" min="10" max="400" step="10" value="150" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>
        </aside>
    </main>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let isRunning = false;
        let animationId = null;

        let numParticles = 150;
        const PARTICLE_RADIUS = 6; 
        const MAX_SPEED = 6.0;
        const BASE_SPEED = 1.2;
        let energyTransferRate = 0.08; 
        
        const GRID_COLS = 60; 
        const GRID_ROWS = 40;
        let cellWidth = 0;
        let cellHeight = 0;
        let walls = new Uint8Array(GRID_COLS * GRID_ROWS);
        
        // 배열 초기화 (undefined 에러 방지)
        let px = new Float32Array(0);
        let py = new Float32Array(0);
        let vx = new Float32Array(0);
        let vy = new Float32Array(0);

        let currentTool = 'heat';
        let brushRadius = 40;
        let isDrawing = false;
        let mouseX = 0, mouseY = 0;

        const colorPalette = [];
        for (let i = 0; i <= 100; i++) {
            let r, g, b;
            const ratio = i / 100;
            if (ratio < 0.25) {
                const t = ratio / 0.25; r = 59; g = 130 + Math.floor(100 * t); b = 246;
            } else if (ratio < 0.5) {
                const t = (ratio - 0.25) / 0.25; r = 59; g = 230; b = Math.floor(246 * (1 - t));
            } else if (ratio < 0.75) {
                const t = (ratio - 0.5) / 0.25; r = Math.floor(59 + 196 * t); g = 230; b = 0;
            } else {
                const t = (ratio - 0.75) / 0.25; r = 255; g = Math.floor(230 * (1 - t)); b = 0;
            }
            colorPalette.push(`rgb(${r},${g},${b})`);
        }

        function getColorFromSpeed(speed) {
            let idx = Math.floor((speed / MAX_SPEED) * 100);
            return colorPalette[Math.min(100, Math.max(0, idx))];
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            if (!container) return;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            cellWidth = canvas.width / GRID_COLS;
            cellHeight = canvas.height / GRID_ROWS;
            render();
        }

        function setupParticleArrays(count) {
            numParticles = count;
            const newPx = new Float32Array(numParticles);
            const newPy = new Float32Array(numParticles);
            const newVx = new Float32Array(numParticles);
            const newVy = new Float32Array(numParticles);

            for (let i = 0; i < numParticles; i++) {
                let valid = false;
                let attempts = 0;
                while(!valid && attempts < 50) {
                    newPx[i] = Math.random() * (canvas.width - 20) + 10;
                    newPy[i] = Math.random() * (canvas.height - 20) + 10;
                    const cx = Math.floor(newPx[i] / (cellWidth || 10));
                    const cy = Math.floor(newPy[i] / (cellHeight || 10));
                    if (cx >= 0 && cx < GRID_COLS && cy >= 0 && cy < GRID_ROWS && !walls[cy * GRID_COLS + cx]) valid = true;
                    attempts++;
                }
                const angle = Math.random() * Math.PI * 2;
                newVx[i] = Math.cos(angle) * BASE_SPEED;
                newVy[i] = Math.sin(angle) * BASE_SPEED;
            }

            // 모든 속성 할당 후 전역 변수 교체
            px = newPx; py = newPy; vx = newVx; vy = newVy;
            
            document.getElementById('currentCount').textContent = numParticles;
            if(!isRunning) render();
        }

        function updatePhysics() {
            if (px.length === 0) return;

            const cellSpeedSum = new Float32Array(GRID_COLS * GRID_ROWS);
            const cellCount = new Int32Array(GRID_COLS * GRID_ROWS);

            for (let i = 0; i < numParticles; i++) {
                const cx = Math.floor(px[i] / cellWidth);
                const cy = Math.floor(py[i] / cellHeight);
                if (cx >= 0 && cx < GRID_COLS && cy >= 0 && cy < GRID_ROWS) {
                    const idx = cy * GRID_COLS + cx;
                    cellSpeedSum[idx] += Math.sqrt(vx[i]**2 + vy[i]**2);
                    cellCount[idx]++;
                }
            }

            for (let i = 0; i < numParticles; i++) {
                if (isDrawing && (currentTool === 'heat' || currentTool === 'cold')) {
                    const dx = px[i] - mouseX;
                    const dy = py[i] - mouseY;
                    if (dx*dx + dy*dy < brushRadius * brushRadius) {
                        if (currentTool === 'heat') {
                            vx[i] *= 1.1; vy[i] *= 1.1;
                            vx[i] += (Math.random()-0.5) * 0.1; vy[i] += (Math.random()-0.5) * 0.1;
                        } else {
                            vx[i] *= 0.85; vy[i] *= 0.85;
                        }
                    }
                }

                const cx = Math.floor(px[i] / cellWidth);
                const cy = Math.floor(py[i] / cellHeight);
                const idx = cy * GRID_COLS + cx;
                if (idx >= 0 && idx < walls.length && cellCount[idx] > 1) {
                    const avg = cellSpeedSum[idx] / cellCount[idx];
                    let cur = Math.sqrt(vx[i]**2 + vy[i]**2) || 0.1;
                    const target = cur * (1 - energyTransferRate) + avg * energyTransferRate;
                    vx[i] *= (target/cur); vy[i] *= (target/cur);
                }

                const sSq = vx[i]**2 + vy[i]**2;
                if (sSq > MAX_SPEED**2) {
                    const s = Math.sqrt(sSq);
                    vx[i] = (vx[i]/s)*MAX_SPEED; vy[i] = (vy[i]/s)*MAX_SPEED;
                }

                let nx = px[i] + vx[i];
                let ny = py[i] + vy[i];

                if (nx < PARTICLE_RADIUS || nx > canvas.width - PARTICLE_RADIUS) { vx[i] *= -1; nx = px[i]; }
                if (ny < PARTICLE_RADIUS || ny > canvas.height - PARTICLE_RADIUS) { vy[i] *= -1; ny = py[i]; }

                const ncx = Math.floor(nx / cellWidth);
                const ncy = Math.floor(ny / cellHeight);
                if (ncx >= 0 && ncx < GRID_COLS && ncy >= 0 && ncy < GRID_ROWS && walls[ncy * GRID_COLS + ncx]) {
                    if (Math.floor(px[i] / cellWidth) !== ncx) vx[i] *= -1;
                    if (Math.floor(py[i] / cellHeight) !== ncy) vy[i] *= -1;
                    nx = px[i]; ny = py[i];
                }

                px[i] = nx; py[i] = ny;
            }
        }

        function render() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 벽 그리기
            ctx.fillStyle = '#64748b';
            for (let y = 0; y < GRID_ROWS; y++) {
                for (let x = 0; x < GRID_COLS; x++) {
                    if (walls[y * GRID_COLS + x]) {
                        ctx.fillRect(x * cellWidth, y * cellHeight, cellWidth, cellHeight);
                    }
                }
            }

            // 드로잉 (벽 생성/제거)
            if (isDrawing && (currentTool === 'wall' || currentTool === 'eraser')) {
                const gridR = Math.ceil(brushRadius / cellWidth);
                const mcx = Math.floor(mouseX / cellWidth);
                const mcy = Math.floor(mouseY / cellHeight);
                for(let y = mcy-gridR; y <= mcy+gridR; y++) {
                    for(let x = mcx-gridR; x <= mcx+gridR; x++) {
                        if(x >= 0 && x < GRID_COLS && y >= 0 && y < GRID_ROWS) {
                            if((x-mcx)**2 + (y-mcy)**2 <= gridR**2) walls[y*GRID_COLS+x] = (currentTool === 'wall' ? 1 : 0);
                        }
                    }
                }
            }

            // 입자 그리기 (배열이 유효한지 확인)
            if (px && px.length > 0) {
                for (let i = 0; i < numParticles; i++) {
                    const speed = Math.sqrt(vx[i]**2 + vy[i]**2);
                    ctx.beginPath();
                    ctx.arc(px[i], py[i], PARTICLE_RADIUS, 0, Math.PI * 2);
                    ctx.fillStyle = getColorFromSpeed(speed);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.stroke();
                }
            }

            // 가이드 원
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, brushRadius, 0, Math.PI * 2);
            ctx.strokeStyle = currentTool === 'heat' ? '#f43f5e' : (currentTool === 'cold' ? '#3b82f6' : '#ffffff33');
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function loop() {
            if (isRunning) {
                updatePhysics();
                render();
            }
            animationId = requestAnimationFrame(loop);
        }

        function updateMouse(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            mouseX = (cx - rect.left) * (canvas.width / rect.width);
            mouseY = (cy - rect.top) * (canvas.height / rect.height);
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; updateMouse(e); });
        canvas.addEventListener('mousemove', (e) => { updateMouse(e); if(!isRunning) render(); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; updateMouse(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); if(!isRunning) render(); }, {passive: false});

        const btnPlay = document.getElementById('btnPlayPause');
        btnPlay.addEventListener('click', () => {
            isRunning = !isRunning;
            btnPlay.innerHTML = isRunning ? '<span>⏸ 실험 멈춤</span>' : '<span>▶ 실험 시작</span>';
            btnPlay.classList.toggle('bg-blue-600', !isRunning);
            btnPlay.classList.toggle('bg-amber-500', isRunning);
        });

        document.getElementById('btnResetParticles').addEventListener('click', () => setupParticleArrays(numParticles));
        document.getElementById('btnClearWalls').addEventListener('click', () => { walls.fill(0); render(); });

        document.getElementById('brushSlider').addEventListener('input', (e) => {
            brushRadius = parseInt(e.target.value);
            document.getElementById('brushSizeVal').textContent = brushRadius;
            if(!isRunning) render();
        });

        document.getElementById('particleSlider').addEventListener('change', (e) => {
            setupParticleArrays(parseInt(e.target.value));
        });
        document.getElementById('particleSlider').addEventListener('input', (e) => {
            document.getElementById('particleCountVal').textContent = e.target.value;
        });

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => {
                    b.classList.remove('active-tool', 'border-rose-400', 'border-blue-400', 'border-slate-400', 'ring-2');
                    b.classList.add('border-transparent');
                });
                currentTool = btn.dataset.tool;
                btn.classList.add('active-tool');
                const colorClass = currentTool === 'heat' ? 'border-rose-400' : (currentTool === 'cold' ? 'border-blue-400' : 'border-slate-400');
                btn.classList.remove('border-transparent');
                btn.classList.add(colorClass, 'ring-2');
            });
        });

        window.onload = () => {
            resizeCanvas();
            setupParticleArrays(150);
            requestAnimationFrame(loop);
            setTimeout(() => { if(!isRunning) btnPlay.click(); }, 100);
        };
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
